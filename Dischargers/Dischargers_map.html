var SKIP_KEYS = new Set(["point_id","latitude_std","longitude_std","source_files","n_rows","source_path"]);
var PRIORITY_COLS = ["acronym","facility_name","site_name","station_type","parameter","monitoring_frequency","frequency"];

function val(v) {
  return (v === null || v === undefined ||
          String(v).trim() === "" ||
          String(v).trim().toLowerCase() === "na" ||
          String(v).trim().toLowerCase() === "null") ? null : String(v).trim();
}

function prettifyKey(k) {
  return k.replace(/_/g, " ")
          .replace(/\b\w/g, c => c.toUpperCase())
          .replace("Per ", "/ ");
}

function row(label, value) {
  if (!val(value)) return "";
  return "<tr><td>" + label + "</td><td>" + value + "</td></tr>";
}

function sectionHead(label) {
  return "<tr class='pp-section-head'><td colspan='2'>" + label + "</td></tr>";
}

function makePopup(p) {
  // Title: use acronym first, then facility_name, then source file cleaned
  var titleFields = ["acronym","facility_name","site_name","wwtp_name","discharger","name"];
  var titleVal = null;
  for (var t of titleFields) {
    if (val(p[t])) { titleVal = val(p[t]); break; }
  }
  if (!titleVal && val(p["source_files"])) {
    titleVal = val(p["source_files"]).replace(/\.csv$/i, "").replace(/_/g, " ").trim();
  }
  if (!titleVal) titleVal = "Discharger Station";

  var subVal = val(p["station_type"]) || val(p["facility_name"]) || "";

  var allKeys     = Object.keys(p).filter(k => !SKIP_KEYS.has(k));
  var paramKeys   = ["parameter","parameters","monitoring_parameter"];
  var freqKeys    = ["monitoring_frequency","frequency","sampling_frequency"];

  var orderedKeys = PRIORITY_COLS.filter(k => allKeys.includes(k))
                      .concat(allKeys.filter(k => !PRIORITY_COLS.includes(k)).sort());

  // Station details section
  var tableRows = sectionHead("Station Details");
  for (var k of orderedKeys) {
    if (!val(p[k]))            continue;
    if (paramKeys.includes(k)) continue;
    if (freqKeys.includes(k))  continue;
    // Skip the title field so it does not repeat in the table
    if (k === "acronym" || k === "facility_name") continue;
    tableRows += row(prettifyKey(k), val(p[k]));
  }

  // Parameters section — pair each param with its frequency if counts match
  var paramVal = null;
  for (var pk of paramKeys) { if (val(p[pk])) { paramVal = val(p[pk]); break; } }
  if (paramVal) {
    tableRows += sectionHead("Parameters Monitored");
    var params   = paramVal.split(";").map(s => s.trim()).filter(Boolean);
    var freqVal  = null;
    for (var fk of freqKeys) { if (val(p[fk])) { freqVal = val(p[fk]); break; } }
    if (freqVal) {
      var freqParts = freqVal.split(";").map(s => s.trim());
      if (freqParts.length === params.length) {
        params.forEach((pm, i) => { tableRows += row(pm, freqParts[i]); });
      } else {
        tableRows += row("Parameters", params.join("; "));
        tableRows += row("Frequency",  freqVal);
      }
    } else {
      tableRows += row("Parameters", params.join("; "));
    }
  }

  // Location section
  var latVal = val(p["latitude_std"]);
  var lonVal = val(p["longitude_std"]);
  if (latVal || lonVal) {
    tableRows += sectionHead("Location");
    if (latVal) tableRows += row("Latitude",  parseFloat(latVal).toFixed(5));
    if (lonVal) tableRows += row("Longitude", parseFloat(lonVal).toFixed(5));
  }

  // Clean up orphaned section headers
  tableRows = tableRows
    .replace(/<tr class=\'pp-section-head\'>.*?<\/tr>(\s*<tr class=\'pp-section-head\'>)/g, "$1")
    .replace(/<tr class=\'pp-section-head\'>.*?<\/tr>\s*$/g, "");

  return "<div class='pp-header'>" +
    "<div class='pp-title'>"    + titleVal + "</div>" +
    (subVal ? "<div class='pp-subtitle'>" + subVal + "</div>" : "") +
    "</div>" +
    "<table class='pp-table'>" + tableRows + "</table>";
}

var dischGeojson = L.geoJSON(geojsonData, {
  pointToLayer: function(feature, latlng) {
    return L.circleMarker(latlng, {
      radius: 7, fillColor: "#e07b00", color: "#8b4c00",
      weight: 1.5, opacity: 1, fillOpacity: 0.85
    });
  },
  onEachFeature: function(feature, layer) {
    layer.bindPopup(makePopup(feature.properties), { maxWidth: 440, maxHeight: 540 });
    layer.on("mouseover", function() { this.setStyle({ fillOpacity: 1, radius: 9 }); });
    layer.on("mouseout",  function() { this.setStyle({ fillOpacity: 0.85, radius: 7 }); });
  }
}).addTo(map);

if (dischGeojson.getLayers().length > 0) {
  map.fitBounds(dischGeojson.getBounds().pad(0.15));
}

};
